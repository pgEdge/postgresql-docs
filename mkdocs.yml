site_name: pgvector v0.8.1

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - def_list
  - md_in_html

plugins:
  - search

theme:
  name: material
  custom_dir: docs/overrides
  favicon: img/favicon.ico

  logo_dark_mode: 'img/logo-dark.png'
  logo_light_mode: 'img/logo-light.png'

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.prune
    - navigation.top
    - toc.follow

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  generator: false

repo_url: https://github.com/pgEdge/postgresql-docs

nav:
  - pgvector: index.md
  - Installation: installation.md
  - Getting Started: getting-started.md
  - Storing: storing.md
  - Querying: querying.md
  - Indexing: indexing.md
  - HNSW: hnsw.md
  - IVFFlat: ivfflat.md
  - Filtering: filtering.md
  - Iterative Index Scans: iterative-index-scans.md
  - Half-Precision Vectors: half-precision-vectors.md
  - Half-Precision Indexing: half-precision-indexing.md
  - Binary Vectors: binary-vectors.md
  - Binary Quantization: binary-quantization.md
  - Sparse Vectors: sparse-vectors.md
  - Hybrid Search: hybrid-search.md
  - Indexing Subvectors: indexing-subvectors.md
  - Performance: performance.md
  - Monitoring: monitoring.md
  - Scaling: scaling.md
  - Languages: languages.md
  - Frequently Asked Questions: frequently-asked-questions.md
  - Troubleshooting: troubleshooting.md
  - Reference: reference.md
  - Installation Notes - Linux and Mac: installation-notes-linux-and-mac.md
  - Installation Notes - Windows: installation-notes-windows.md
  - Additional Installation Methods: additional-installation-methods.md
  - Hosted Postgres: hosted-postgres.md
  - Upgrading: upgrading.md
  - Thanks: thanks.md
  - History: history.md
  - Contributing: contributing.md
