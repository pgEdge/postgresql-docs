site_name: pg_vectorize dev

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - def_list
  - md_in_html

plugins:
  - search

theme:
  name: material
  custom_dir: docs/overrides
  favicon: img/favicon.ico

  logo_dark_mode: 'img/logo-dark.png'
  logo_light_mode: 'img/logo-light.png'

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.prune
    - navigation.top
    - toc.follow

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  generator: false

repo_url: https://github.com/pgEdge/postgresql-docs

nav:
  - Vectorize: 'index.md'
  - Server:
    - API:
      - Table: 'server/api/table.md'
      - Search: 'server/api/search.md'
  - Extension:
    - API:
      - Overview: 'extension/api/index.md'
      - Search: 'extension/api/search.md'
      - RAG: 'extension/api/rag.md'
      - Utilities: 'extension/api/utilities.md'
    - Model Providers: 'extension/models/index.md'
    - Examples:
      - Search:
        - Sentence Transformers: 'extension/examples/sentence_transformers.md'
        - OpenAI Embeddings: 'extension/examples/openai_embeddings.md'
        - Scheduling: 'extension/examples/scheduling.md'
