site_name: pgBackRest dev

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - def_list
  - md_in_html

plugins:
  - search

theme:
  name: material
  custom_dir: docs/overrides
  favicon: img/favicon.ico

  logo_dark_mode: 'img/logo-dark.png'
  logo_light_mode: 'img/logo-light.png'

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.prune
    - navigation.top
    - toc.follow

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  generator: false

repo_url: https://github.com/pgEdge/postgresql-docs

nav:
  - pgBackRest: index.md
  - pgBackRest: documentation.md
  - pgBackRest Releases: release.md
  - pgBackRest User Guide: user-guide/index.md
  - User Guide:
    - Introduction: user-guide/introduction.md
    - Concepts: user-guide/concept.md
    - Upgrading pgBackRest: user-guide/upgrading.md
    - Build: user-guide/build.md
    - Installation: user-guide/installation.md
    - Quick Start: user-guide/quickstart.md
    - Monitoring: user-guide/monitor.md
    - Backup: user-guide/backup.md
    - Retention: user-guide/retention.md
    - Restore: user-guide/restore.md
    - Point-in-Time Recovery: user-guide/pitr.md
    - Delete a Stanza: user-guide/delete-stanza.md
    - Multiple Repositories: user-guide/multi-repo.md
    - Azure-Compatible Object Store Support: user-guide/azure-support.md
    - S3-Compatible Object Store Support: user-guide/s3-support.md
    - SFTP Support: user-guide/sftp-support.md
    - GCS-Compatible Object Store Support: user-guide/gcs-support.md
    - Target Time for Repository: user-guide/repo-target-time.md
    - Dedicated Repository Host: user-guide/repo-host.md
    - Parallel Backup / Restore: user-guide/parallel-backup-restore.md
    - Starting and Stopping: user-guide/start-stop.md
    - Replication: user-guide/replication.md
    - Multiple Stanzas: user-guide/multi-stanza.md
    - Asynchronous Archiving: user-guide/async-archiving.md
    - Backup from a Standby: user-guide/standby-backup.md
    - Stress Testing: user-guide/stress.md
    - Upgrading: user-guide/upgrade-stanza.md
  - pgBackRest: faq.md
  - pgBackRest: metric.md
  - pgBackRest: coding.md
  - pgBackRest: contributing.md
