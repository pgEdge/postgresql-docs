site_name: pg_cron v1.6.7

extra_css:
  - stylesheets/extra.css

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - attr_list
  - def_list
  - md_in_html

plugins:
  - search

theme:
  name: material
  custom_dir: docs/overrides
  favicon: img/favicon.ico

  logo_dark_mode: 'img/logo-dark.png'
  logo_light_mode: 'img/logo-light.png'

  features:
    - navigation.instant
    - navigation.tracking
    - navigation.prune
    - navigation.top
    - toc.follow

  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: white
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: black
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to system preference

extra:
  generator: false

repo_url: https://github.com/pgEdge/postgresql-docs

nav:
  - README: index.md
  - What is pg_cron?: what-is-pg_cron.md
  - Installing pg_cron: installing-pg_cron.md
  - Setting up pg_cron: setting-up-pg_cron.md
  - Viewing job run details: viewing-job-run-details.md
  - Extension settings: extension-settings.md
  - Example use cases: example-use-cases.md
  - Managed services: managed-services.md
  - Code of Conduct: code-of-conduct.md
